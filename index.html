<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>공공기관 IT/AI 조직 관제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Pretendard Variable",Pretendard,"Malgun Gothic",sans-serif;background:#0a0e1a;color:#cdd6f4;padding:24px 20px;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 18% 0%,rgba(56,189,248,.07),transparent 42%),radial-gradient(circle at 92% 8%,rgba(251,146,60,.05),transparent 38%);min-height:100vh;}
h1{font-size:23px;font-weight:800;color:#e8eefc;display:flex;align-items:center;gap:10px;}
h1 .dot{width:11px;height:11px;border-radius:50%;background:#22d3ee;box-shadow:0 0 12px #22d3ee;}
.sub{color:#5a6b86;font-size:13px;margin:5px 0 18px;}
::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:#1e2940;border-radius:6px;border:2px solid #0a0e1a;}::-webkit-scrollbar-thumb:hover{background:#2d3c5c;}
.modes{display:flex;gap:6px;margin-bottom:12px;}
.mode{padding:9px 18px;border:1px solid #1e2940;background:#0e1424;border-radius:9px 9px 0 0;cursor:pointer;font-size:14px;font-weight:700;color:#5a6b86;}
.mode.active{background:#22d3ee;color:#04121a;border-color:#22d3ee;box-shadow:0 0 16px rgba(34,211,238,.3);}
.toolbar{background:rgba(17,24,39,.7);backdrop-filter:blur(8px);border:1px solid #1e2940;border-radius:12px;padding:13px 15px;margin-bottom:8px;position:sticky;top:8px;z-index:20;}
.tline{display:flex;gap:9px;flex-wrap:wrap;align-items:center;}
.tline+.tline{margin-top:9px;}
.toolbar input,.toolbar select{background:#0a0e1a;border:1px solid #1e2940;color:#cdd6f4;padding:9px 12px;border-radius:8px;font-size:13.5px;}
.toolbar input::placeholder{color:#3f4d66;}
#q{flex:1 1 240px;}
.rangebox{display:flex;align-items:center;gap:6px;font-size:12.5px;color:#5a6b86;}
.rangebox input{width:92px;}
.lab{font-size:12px;color:#5a6b86;}
.chk{display:flex;align-items:center;gap:5px;font-size:12.5px;color:#94a3b8;cursor:pointer;}
.chk input,.toolbar input[type=checkbox]{accent-color:#22d3ee;width:auto;}
.numin{width:90px;}
.toolbar input:disabled,.toolbar select:disabled{opacity:.38;}
.cat{padding:7px 13px;border:1px solid #1e2940;background:#0e1424;color:#94a3b8;border-radius:20px;font-size:12.5px;cursor:pointer;transition:all .15s;}
.cat:hover{border-color:#22d3ee;color:#22d3ee;}
.cat.active{background:#22d3ee;color:#04121a;border-color:#22d3ee;font-weight:700;box-shadow:0 0 14px rgba(34,211,238,.35);}
.count{font-size:12.5px;color:#5a6b86;margin:8px 2px 14px;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#5a6b86;margin-bottom:14px;}
.legend i{width:13px;height:13px;border-radius:3px;display:inline-block;vertical-align:-2px;margin-right:4px;}
.aitag{font-size:10px;background:linear-gradient(135deg,#fb923c,#ea580c);color:#04121a;padding:2px 7px;border-radius:10px;font-weight:700;vertical-align:middle;}
.org{background:linear-gradient(160deg,#111827,#0c1322);border:1px solid #1e2940;border-radius:16px;padding:20px 22px;margin-bottom:18px;transition:border-color .2s,box-shadow .2s;}
.org:hover{border-color:#2d4060;box-shadow:0 0 26px rgba(34,211,238,.07);}
.oh{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;border-bottom:1px solid #1e2940;padding-bottom:10px;margin-bottom:6px;}
.oh h2{font-size:17px;color:#e8eefc;font-weight:700;}
.badges{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;}
.b{font-size:11px;padding:3px 9px;border-radius:20px;background:#16203a;color:#94a3b8;border:1px solid #243150;}
.b.kr{background:#3b2f0a;color:#fcd34d;border-color:#a16207;font-weight:700;}
.b.rel{background:#0c2a1a;color:#4ade80;border-color:#15803d;}
.b.rel.중{background:#2a240a;color:#facc15;border-color:#a16207;}.b.rel.하{background:#2c1414;color:#f87171;border-color:#b91c1c;}
.summary{font-size:12.5px;color:#5a6b86;margin:9px 0 4px;display:flex;gap:8px;flex-wrap:wrap;}
.summary b{color:#cbd5e1;}.summary .ai{color:#fb923c;font-weight:700;}
.chart{position:relative;padding-top:8px;overflow-x:auto;}
.chart svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.chart .layer{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-width:max-content;}
.hqw{display:flex;justify-content:center;}
.hq{border:1.5px solid #22d3ee;border-radius:12px;background:rgba(34,211,238,.07);color:#67e8f9;font-weight:700;padding:11px 20px;text-align:center;font-size:14.5px;max-width:540px;box-shadow:0 0 22px rgba(34,211,238,.13);}
.hq.ai{border-color:#fb923c;background:rgba(251,146,60,.08);color:#fdba74;box-shadow:0 0 22px rgba(251,146,60,.14);}
.row{display:flex;justify-content:center;gap:16px;margin-top:32px;}
.d{border:1px solid #243150;border-radius:10px;background:#0e1424;min-width:150px;max-width:210px;overflow:hidden;flex:0 0 auto;}
.d.ai{border-color:#7c4a1e;box-shadow:0 0 14px rgba(251,146,60,.1);}
.dh{padding:9px 11px;font-weight:700;font-size:13px;text-align:center;background:#131c33;color:#cbd5e1;border-bottom:1px solid #1e2940;}
.d.ai .dh{background:#241606;color:#fdba74;}
.dbody{padding:7px 9px;display:flex;flex-direction:column;gap:4px;}.dbody:empty{display:none;}
.unit{font-size:11.5px;padding:4px 7px;background:#0a0e1a;border-radius:5px;color:#94a3b8;text-align:center;}
.d.ai .unit{background:#1a1206;color:#e9a76a;}
.flat{color:#475569;font-size:12px;margin-top:16px;}
.note{margin-top:14px;font-size:11.5px;color:#5a6b86;background:#0c1322;border-left:3px solid #243150;padding:8px 11px;border-radius:0 6px 6px 0;}
.pager{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:18px 0;}
.pager button{min-width:38px;padding:8px 12px;border:1px solid #1e2940;background:#0e1424;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s;}
.pager button:hover:not(:disabled):not(.active){border-color:#22d3ee;color:#22d3ee;}
.pager button.active{background:#22d3ee;color:#04121a;border-color:#22d3ee;font-weight:700;}
.pager button:disabled{opacity:.35;cursor:default;}
.empty{text-align:center;color:#475569;padding:60px 0;font-size:15px;}
/* dashboard */
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.k{flex:1 1 150px;background:linear-gradient(160deg,#131a2e,#0e1424);border:1px solid #1e2940;border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;}
.k::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#22d3ee,transparent);}
.k.ai::after{background:linear-gradient(90deg,#fb923c,transparent);}
.k .n{font-size:30px;font-weight:800;color:#22d3ee;text-shadow:0 0 18px rgba(34,211,238,.35);}
.k.ai .n{color:#fb923c;text-shadow:0 0 18px rgba(251,146,60,.35);}
.k .t{font-size:12px;color:#5a6b86;margin-top:3px;}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;}
.card{background:linear-gradient(160deg,#111827,#0c1322);border:1px solid #1e2940;border-radius:14px;padding:18px 20px;}
.card h3{font-size:15px;color:#67e8f9;margin-bottom:14px;}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px;}
.brow .bl{flex:0 0 130px;color:#94a3b8;}
.brow .tr{flex:1;height:18px;background:#0a0e1a;border-radius:9px;overflow:hidden;border:1px solid #1e2940;}
.brow .fl{display:block;height:100%;border-radius:9px;background:#3b82f6;transition:width .7s cubic-bezier(.2,.8,.2,1);}
.brow .fl.ai{background:#f97316;}
.brow .fl.top{background:#1d4ed8;}
.brow .fl.ai.top{background:#c2410c;}
.brow .bv{flex:0 0 58px;text-align:right;font-weight:700;color:#cbd5e1;font-size:12.5px;}
@media print{body{background:#fff;color:#000;}.toolbar,.pager,.modes{display:none;}}
/* ===== MOBILE ===== */
@media (max-width:640px){
  body{padding:12px 10px;}
  h1{font-size:18px;gap:7px;}
  h1 .dot{width:9px;height:9px;}
  .tgl{width:34px;height:34px;font-size:15px;}
  .sub{font-size:11.5px;margin-bottom:12px;}
  .modes{gap:4px;margin-bottom:8px;}
  .mode{padding:7px 11px;font-size:12.5px;}
  .toolbar{padding:10px 11px;border-radius:10px;position:static;top:auto;}
  .tline{gap:6px;}
  .tline+.tline{margin-top:6px;}
  .toolbar input,.toolbar select{padding:9px 10px;font-size:13.5px;}
  #q{min-width:0;width:100%;}
  .cats-wrap{position:relative;overflow:hidden;}
  .cats-wrap::after{content:"";position:absolute;right:0;top:0;bottom:3px;width:40px;background:linear-gradient(to right,transparent,#0a0e1a);pointer-events:none;transition:opacity .3s;}
  [data-theme=light] .cats-wrap::after{background:linear-gradient(to right,transparent,#eef2f7);}
  .cats-wrap.end::after{opacity:0;}
  #cats{flex-wrap:nowrap !important;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px;scrollbar-width:none;}
  #cats::-webkit-scrollbar{display:none;}
  .cat{white-space:nowrap;flex-shrink:0;padding:6px 11px;font-size:12px;}
  .chk{font-size:12px;}
  .numin{width:76px;font-size:16px;}
  .rangebox input{width:76px;font-size:16px;}
  .count{font-size:12px;}
  .legend{gap:8px;font-size:11.5px;margin-bottom:10px;}
  .org{padding:14px 13px;border-radius:12px;margin-bottom:13px;}
  .oh h2{font-size:15px;}
  .badges{gap:4px;}
  .b{font-size:10.5px;padding:2px 7px;}
  .summary{font-size:12px;gap:6px;}
  .note{font-size:11px;}
  .hq{font-size:13px;padding:9px 14px;max-width:100%;}
  .d{min-width:120px;max-width:170px;}
  .dh{font-size:12px;padding:8px 9px;}
  .unit{font-size:11px;}
  .row{gap:10px;margin-top:20px;}
  .pager button{min-width:36px;padding:7px 10px;font-size:12px;}
  .k{flex:1 1 130px;padding:12px 13px;}
  .k .n{font-size:24px;}
  .k .t{font-size:11.5px;}
  .dgrid{grid-template-columns:1fr;}
  .brow{font-size:12px;gap:7px;}
  .brow .bl{flex:0 0 95px;}
  .brow .bv{flex:0 0 44px;font-size:11px;}
}
.tgl{margin-left:auto;background:#0e1424;border:1px solid #1e2940;color:#cdd6f4;width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:17px;line-height:1;}
.tgl:hover{border-color:#22d3ee;}
/* ===== LIGHT MODE ===== */
[data-theme=light] body{background:#eef2f7;background-image:radial-gradient(circle at 18% 0%,rgba(15,61,110,.04),transparent 42%);color:#1f2937;}
[data-theme=light] h1{color:#0f3d6e;}
[data-theme=light] .dot{background:#0f3d6e;box-shadow:none;}
[data-theme=light] .sub,[data-theme=light] .count,[data-theme=light] .lab,[data-theme=light] .legend,[data-theme=light] .summary,[data-theme=light] .rangebox,[data-theme=light] .chk{color:#64748b;}
[data-theme=light] .tgl{background:#fff;border-color:#cbd5e1;color:#0f3d6e;}
[data-theme=light] .mode{background:#fff;border-color:#cbd5e1;color:#64748b;}
[data-theme=light] .mode.active{background:#0f3d6e;color:#fff;border-color:#0f3d6e;box-shadow:0 2px 6px rgba(15,61,110,.25);}
[data-theme=light] .toolbar{background:rgba(255,255,255,.85);border-color:#e3e8ef;box-shadow:0 2px 12px rgba(15,61,110,.06);}
[data-theme=light] .toolbar input,[data-theme=light] .toolbar select{background:#fff;border-color:#cbd5e1;color:#1f2937;}
[data-theme=light] .toolbar input::placeholder{color:#9aa7ba;}
[data-theme=light] .cat{background:#fff;border-color:#cbd5e1;color:#475569;}
[data-theme=light] .cat:hover{border-color:#0f3d6e;color:#0f3d6e;}
[data-theme=light] .cat.active{background:#0f3d6e;color:#fff;border-color:#0f3d6e;box-shadow:0 2px 6px rgba(15,61,110,.25);}
[data-theme=light] .org{background:#fff;border-color:#e9eef5;box-shadow:0 2px 8px rgba(15,61,110,.05);}
[data-theme=light] .org:hover{border-color:#cbd5e1;box-shadow:0 8px 24px rgba(15,61,110,.10);}
[data-theme=light] .oh{border-color:#e3e8ef;}[data-theme=light] .oh h2{color:#0f3d6e;}
[data-theme=light] .b{background:#eef2f7;color:#475569;border-color:#dfe5ee;}
[data-theme=light] .b.kr{background:#fde68a;color:#92660a;border-color:#f59e0b;}
[data-theme=light] .b.rel{background:#dcfce7;color:#15803d;border-color:#16a34a;}
[data-theme=light] .b.rel.중{background:#fef9c3;color:#a16207;border-color:#ca8a04;}
[data-theme=light] .b.rel.하{background:#fee2e2;color:#b91c1c;border-color:#dc2626;}
[data-theme=light] .summary b{color:#0f3d6e;}[data-theme=light] .summary .ai{color:#c2410c;}
[data-theme=light] .hq{border-color:#0f3d6e;background:linear-gradient(135deg,#f0f6fd,#dbeafe);color:#0f3d6e;box-shadow:0 3px 10px rgba(15,61,110,.12);}
[data-theme=light] .hq.ai{border-color:#c2410c;background:linear-gradient(135deg,#fff5ef,#ffe4d3);color:#b03a0b;box-shadow:0 3px 10px rgba(194,65,12,.14);}
[data-theme=light] .d{background:#fff;border-color:#d3dce8;box-shadow:0 1px 4px rgba(15,61,110,.06);}
[data-theme=light] .d.ai{border-color:#f0a878;}
[data-theme=light] .dh{background:#f1f5fa;color:#334155;border-color:#e3e8ef;}
[data-theme=light] .d.ai .dh{background:#fff1ea;color:#c2410c;}
[data-theme=light] .unit{background:#f1f5f9;color:#475569;}
[data-theme=light] .d.ai .unit{background:#ffedd5;color:#9a3412;}
[data-theme=light] .note{background:#f8fafc;border-color:#cbd5e1;color:#64748b;}
[data-theme=light] .empty,[data-theme=light] .flat{color:#94a3b8;}
[data-theme=light] .pager button{background:#fff;border-color:#d3dce8;color:#475569;}
[data-theme=light] .pager button:hover:not(:disabled):not(.active){border-color:#0f3d6e;color:#0f3d6e;}
[data-theme=light] .pager button.active{background:#0f3d6e;color:#fff;border-color:#0f3d6e;}
[data-theme=light] .k{background:linear-gradient(160deg,#fff,#f4f8fd);border-color:#e3e8ef;box-shadow:0 2px 8px rgba(15,61,110,.05);}
[data-theme=light] .k .n{color:#0f3d6e;text-shadow:none;}[data-theme=light] .k.ai .n{color:#c2410c;text-shadow:none;}
[data-theme=light] .card{background:#fff;border-color:#e3e8ef;}[data-theme=light] .card h3{color:#0f3d6e;}
[data-theme=light] .brow .bl{color:#475569;}[data-theme=light] .brow .tr{background:#e2e8f0;border-color:#cbd5e1;}[data-theme=light] .brow .bv{color:#0f3d6e;}
[data-theme=light] .brow .fl{background:#3b82f6;}[data-theme=light] .brow .fl.ai{background:#f97316;}[data-theme=light] .brow .fl.top{background:#1d4ed8;}[data-theme=light] .brow .fl.ai.top{background:#c2410c;}
[data-theme=light] ::-webkit-scrollbar-thumb{background:#c3cedd;border-color:#eef2f7;}
</style>
<script>(function(){var t=localStorage.getItem('theme');if(t!=='light'&&t!=='dark')t='light';document.documentElement.setAttribute('data-theme',t);})();</script>
</head><body>
<h1><span class="dot"></span>공공기관 IT/AI 조직 관제<button class="tgl" id="tgl" onclick="toggleTheme()" title="다크/라이트 전환">🌙</button></h1>
<div class="sub">공기업 30 + 준정부기관 60 + 기타공공기관 184 = 274개 · 출처: 각 기관 공식 조직도/공시(2026-06)</div>
<div class="modes">
  <div class="mode active" id="m-org" onclick="setMode('org')">🗂 조직도</div>
  <div class="mode" id="m-stat" onclick="setMode('stat')">📊 통계 대시보드</div>
</div>
<div class="toolbar" id="toolbar">
  <div class="tline">
    <input id="q" placeholder="🔍 기관·조직·주무부처·CIO/CISO·특이사항 검색" oninput="state.q=this.value;state.page=1;render()">
    <select id="sort" onchange="state.sort=this.value;state.page=1;render()">
      <option value="name">가나다순</option>
      <option value="hcDesc">직원 수 ↓ 많은순</option>
      <option value="hcAsc">직원 수 ↑ 적은순</option>
    </select>
  </div>
  <div class="tline">
    <div class="cats-wrap"><div class="cats" id="cats" style="display:flex;gap:6px;flex-wrap:wrap;"></div></div>
    <label class="chk"><input type="checkbox" id="hcChk" onchange="state.hcOn=this.checked;document.getElementById('hmin').disabled=!this.checked;state.page=1;render()">👥 직원 수</label>
    <input type="number" id="hmin" class="numin" placeholder="0" disabled oninput="state.hcMin=this.value;state.page=1;render()"><span class="lab">명 이상</span>
  </div>
</div>
<div class="legend">
  <span><i style="background:rgba(251,146,60,.2);border:1.5px solid #fb923c"></i>AI명칭/AI전담 본부</span>
  <span><i style="background:rgba(34,211,238,.2);border:1.5px solid #22d3ee"></i>IT 최상위 본부</span>
  <span><span class="aitag">AI</span> AI 전환 전담</span>
</div>
<div class="count" id="count"></div>
<div id="list"></div>
<div class="pager" id="pager"></div>

  if(o) render(); else {renderDashCtrl();renderDash();}
}
function bar(l,n,t,ai,top){const p=t?Math.round(n/t*100):0;const cls='fl'+(ai?' ai':'')+((top&&n>0)?' top':'');return `<div class="brow"><span class="bl">${l}</span><span class="tr"><span class="${cls}" data-w="${p}" style="width:0%"></span></span><span class="bv">${n} (${p}%)</span></div>`;}
function animBars(){requestAnimationFrame(()=>document.querySelectorAll('.fl[data-w]').forEach(el=>el.style.width=el.dataset.w+'%'));}
function dashData(){return DATA.filter(d=>{
  if(dstate.cat!=='전체'&&d.type!==dstate.cat)return false;
  if(dstate.hcOn&&dstate.hcMin!==''&&d.hc<+dstate.hcMin)return false;
  return true;});}
function renderDashCtrl(){
  const opts=['전체','공기업(시장형)','공기업(준시장형)','준정부기관(위탁집행형)','준정부기관(기금관리형)','기타공공기관']
    .map(c=>`<option ${c===dstate.cat?'selected':''}>${c}</option>`).join('');
  document.getElementById('dashctrl').innerHTML=`<div class="toolbar" style="position:static;margin-bottom:16px"><div class="tline">
    <span class="lab">카테고리</span>
    <select onchange="dstate.cat=this.value;renderDash()">${opts}</select>
    <label class="chk"><input type="checkbox" ${dstate.hcOn?'checked':''} onchange="dstate.hcOn=this.checked;document.getElementById('dhmin').disabled=!this.checked;renderDash()">👥 직원 수</label>
    <input type="number" id="dhmin" class="numin" placeholder="0" ${dstate.hcOn?'':'disabled'} value="${dstate.hcMin}" oninput="dstate.hcMin=this.value;renderDash()"><span class="lab">명 이상</span>
  </div></div>`;
}
function renderDash(){
  const set=dashData();
  const N=set.length,c=f=>set.filter(f).length,lv=l=>c(d=>d.level===l),ai=v=>c(d=>d.aiYN===v),g=(gr,f)=>set.filter(d=>d.grp===gr&&f(d)).length;
  const ng=c(d=>d.grp==='공기업'),nj=c(d=>d.grp==='준정부'),nk=c(d=>d.grp==='기타');
  if(!N){document.getElementById('dashbody').innerHTML='<div class="empty">🔍 조건에 맞는 기관이 없습니다.</div>';return;}
  const lvBoss=lv('본부급'),lvPS=lv('처·실급'),lvTeam=lv('팀급'),lvEtc=lv('분산·미상');
  const lvMax=Math.max(lvBoss,lvPS,lvTeam,lvEtc);
  const aiYes=ai('있음'),aiNo=ai('없음'),aiUnk=ai('확인불가');
  const aiMax=Math.max(aiYes,aiNo,aiUnk);
  const gaiE=g('공기업',d=>d.aiYN==='있음'),gaiJ=g('준정부',d=>d.aiYN==='있음'),gaiK=g('기타',d=>d.aiYN==='있음');
  const paiE=ng?gaiE/ng:0,paiJ=nj?gaiJ/nj:0,paiK=nk?gaiK/nk:0,paiMax=Math.max(paiE,paiJ,paiK);
  const gbE=g('공기업',d=>d.level==='본부급'),gbJ=g('준정부',d=>d.level==='본부급'),gbK=g('기타',d=>d.level==='본부급');
  const pbE=ng?gbE/ng:0,pbJ=nj?gbJ/nj:0,pbK=nk?gbK/nk:0,pbMax=Math.max(pbE,pbJ,pbK);
  document.getElementById('dashbody').innerHTML=`<div class="kpi">
    <div class="k"><div class="n">${N}</div><div class="t">조사 기관</div></div>
    <div class="k ai"><div class="n">${aiYes}</div><div class="t">AI 전담조직 보유</div></div>
    <div class="k"><div class="n">${lvBoss}</div><div class="t">본부급 IT조직</div></div>
    <div class="k ai"><div class="n">${c(d=>d.ax)}</div><div class="t">AX 명칭 채택</div></div></div>
   <div class="dgrid">
    <div class="card"><h3>IT조직 레벨 분포</h3>${bar('본부급',lvBoss,N,false,lvBoss===lvMax&&lvBoss>0)}${bar('처·실급',lvPS,N,false,lvPS===lvMax&&lvPS>0)}${bar('팀급',lvTeam,N,false,lvTeam===lvMax&&lvTeam>0)}${lvEtc?bar('분산·미상',lvEtc,N,false,lvEtc===lvMax&&lvEtc>0):''}</div>
    <div class="card"><h3>AI 전담조직 유무</h3>${bar('있음',aiYes,N,true,aiYes===aiMax&&aiYes>0)}${bar('없음',aiNo,N,false,aiNo===aiMax&&aiNo>0)}${bar('확인불가',aiUnk,N,false,aiUnk===aiMax&&aiUnk>0)}</div>
    <div class="card"><h3>AI 보유율 — 그룹 비교</h3>${bar('공기업 ('+ng+')',gaiE,ng,true,paiMax>0&&Math.abs(paiE-paiMax)<1e-9)}${bar('준정부 ('+nj+')',gaiJ,nj,true,paiMax>0&&Math.abs(paiJ-paiMax)<1e-9)}${bar('기타 ('+nk+')',gaiK,nk,true,paiMax>0&&Math.abs(paiK-paiMax)<1e-9)}</div>
    <div class="card"><h3>본부급 비율 — 그룹 비교</h3>${bar('공기업 ('+ng+')',gbE,ng,false,pbMax>0&&Math.abs(pbE-pbMax)<1e-9)}${bar('준정부 ('+nj+')',gbJ,nj,false,pbMax>0&&Math.abs(pbJ-pbMax)<1e-9)}${bar('기타 ('+nk+')',gbK,nk,false,pbMax>0&&Math.abs(pbK-pbMax)<1e-9)}</div></div>
   <div class="sub" style="margin-top:14px">※ 현재 조건 ${N}개 기관 기준 집계 (카테고리·직원 수 조건 반영).</div>`;
  animBars();
}
function drawConn(chart){const svg=chart.querySelector('svg');if(!svg)return;
  const hq=chart.querySelector('[data-hq]'),deps=[...chart.querySelectorAll('[data-dept]')];
  if(!hq||!deps.length){svg.innerHTML='';return;}
  const base=chart.getBoundingClientRect(),rel=el=>{const r=el.getBoundingClientRect();return{cx:r.left-base.left+r.width/2,top:r.top-base.top,bottom:r.bottom-base.top};};
  const h=rel(hq),ds=deps.map(rel),busY=(h.bottom+Math.min(...ds.map(d=>d.top)))/2;
  let p=`M ${h.cx} ${h.bottom} L ${h.cx} ${busY} `;const xs=ds.map(d=>d.cx);
  if(ds.length>1)p+=`M ${Math.min(...xs)} ${busY} L ${Math.max(...xs)} ${busY} `;
  ds.forEach(d=>{p+=`M ${d.cx} ${busY} L ${d.cx} ${d.top} `;});
  const stroke=document.documentElement.getAttribute('data-theme')==='light'?'#b9c6d8':'#2f3e5c';
  svg.innerHTML=`<path d="${p}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="square"/>`;
}
function toggleTheme(){
  const c=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',c);
  localStorage.setItem('theme',c);
  document.getElementById('tgl').textContent=c==='dark'?'🌙':'☀️';
  document.querySelectorAll('.chart').forEach(drawConn);
}
document.getElementById('tgl').textContent=document.documentElement.getAttribute('data-theme')==='dark'?'🌙':'☀️';
window.addEventListener('resize',()=>document.querySelectorAll('.chart').forEach(drawConn));
render();
</script></body></html>
